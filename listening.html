<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Listening — Practice Kit</title>
<style>
  :root{
    --paper:#eee7d8;
    --ink:#22303f;
    --ink-soft:#5a6b7a;
    --rule:#c9bfa4;
    --tab-1:#8a5a3f;
    --tab-2:#3f6e5e;
    --tab-3:#4a5a8a;
    --card:#f7f3e8;
    --err:#b23a3a;
    --vocab:#3f5e8a;
    --idiom:#7a3f6e;
    --good:#2f7a4f;
    --gen:#8a8578;
  }
  
  body.dark-mode {
    --paper:#1b1913;
    --ink:#ede8dc;
    --ink-soft:#a29988;
    --rule:#4d4637;
    --tab-1:#b88363;
    --tab-2:#569681;
    --tab-3:#6d7da8;
    --card:#242017;
    --err:#d95f5f;
    --vocab:#6997d3;
    --idiom:#b56ba7;
    --good:#4eaf75;
    --gen:#a29e92;
  }

  *{box-sizing:border-box;}

  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }
  ::-webkit-scrollbar-track {
    background: var(--paper);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--rule);
    border-radius: 5px;
    border: 2px solid var(--paper);
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--ink-soft);
  }
  
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:'Georgia','Iowan Old Style',serif;
    padding:32px 16px 80px;
    min-height:100vh;
    transition:background-color 0.3s ease, color 0.3s ease;
  }
  
  .wrap{max-width:820px;margin:0 auto;}
  
  /* Global Navigation */
  .global-nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 12px;
  }
  .global-nav a {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink-soft);
    padding: 6px 12px;
    border-radius: 3px;
    transition: all 0.2s ease;
  }
  .global-nav a:hover {
    color: var(--ink);
    background: rgba(0,0,0,0.04);
  }
  body.dark-mode .global-nav a:hover {
    background: rgba(255,255,255,0.04);
  }
  .global-nav a.active {
    color: var(--paper);
    background: var(--ink);
  }

  header{
    border-bottom:3px double var(--ink);
    padding-bottom:18px;
    margin-bottom:24px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    transition:border-color 0.3s ease;
  }
  
  .kicker{font-family:'Courier New',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);transition:color 0.3s ease;}
  h1{font-size:34px;margin:6px 0 4px;font-weight:400;}
  .sub{color:var(--ink-soft);font-size:14px;font-style:italic;transition:color 0.3s ease;}

  .mode-toggle{
    font-family:'Courier New',monospace;font-size:11px;background:none;border:1px solid var(--ink);
    color:var(--ink);padding:6px 10px;cursor:pointer;border-radius:3px;
    transition:background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .mode-toggle:hover{background:rgba(0,0,0,.05);}
  body.dark-mode .mode-toggle:hover{background:rgba(255,255,255,.05);}

  .view-switch {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--paper);
    padding: 14px 0 12px 0;
    margin: 0 0 20px 0;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 8px;
    transition: background-color 0.3s ease, border-color 0.3s ease;
  }
  .view-btn{
    flex:1;font-family:'Courier New',monospace;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    padding: 10px 14px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;border-radius:3px;text-align:center;
    transition:background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease;
  }
  .view-btn.active{background:var(--ink);color:var(--paper);}

  .controls {
    position: sticky;
    top: 61px;
    z-index: 99;
    background: var(--paper);
    padding: 10px 0;
    margin: 0 0 20px 0;
    border-bottom: 1px dashed var(--rule);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    transition: background-color 0.3s ease, border-color 0.3s ease;
  }
  .controls input[type=text]{
    flex:1;min-width:180px;font-family:'Courier New',monospace;font-size:13px;
    padding:9px 12px;border:1px solid var(--rule);background:var(--card);color:var(--ink);border-radius:3px;
    transition:background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  }
  .controls input[type=text]:focus{
    outline:none;
    border-color:var(--ink);
  }

  .cue-card, .band-card{
    border:1px solid var(--rule);background:var(--card);margin-bottom:14px;border-radius:3px;overflow:hidden;
    transition:background-color 0.3s ease, border-color 0.3s ease;
  }
  .skill-card-head{
    padding:11px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:15px;border-bottom:1px solid transparent;
    transition:background-color 0.3s ease, border-color 0.3s ease;
  }
  .skill-card-head:hover{background:rgba(0,0,0,.03);}
  body.dark-mode .skill-card-head:hover{background:rgba(255,255,255,.03);}
  
  .cue-card.skill-card.open .skill-card-head{
    border-bottom-color:var(--rule);
  }
  
  .skill-body-wrapper {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    padding: 0 16px;
  }
  .cue-card.skill-card.open .skill-body-wrapper {
    max-height: 2000px;
    opacity: 1;
    padding-bottom: 16px;
  }

  .caret{font-family:'Courier New',monospace;font-size:12px;color:var(--ink-soft);transition:transform .2s ease, color 0.3s ease;}
  .cue-card.skill-card.open .caret{transform:rotate(90deg);}

  .skill-num{
    font-family:'Courier New',monospace;font-size:12px;font-weight:bold;padding:2px 8px;border-radius:2px;color:var(--paper);
    background: var(--tab-3);
  }
  .skill-criterion{
    font-family:'Courier New',monospace;font-size:10.5px;color:var(--ink-soft);border:1px solid var(--rule);padding:1px 6px;border-radius:2px;
  }

  ol.qlist{list-style:none;counter-reset:q;margin:0;padding:12px 16px 14px;}
  ol.qlist li{
    counter-increment:q;position:relative;padding:8px 0 8px 30px;font-size:14.5px;line-height:1.55;border-bottom:1px dashed var(--rule);
    transition:border-color 0.3s ease;
  }
  ol.qlist li:last-child{border-bottom:none;}
  ol.qlist li::before{content:counter(q,decimal-leading-zero);position:absolute;left:0;top:8px;font-family:'Courier New',monospace;font-size:11px;color:var(--ink-soft);}

  .qa-row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .qa-q{flex:1;}
  .ans-toggle{
    flex-shrink:0;
    font-family:'Courier New',monospace;font-size:10.5px;letter-spacing:.03em;text-transform:uppercase;
    color:var(--tab-3);background:none;border:1px solid var(--tab-3);border-radius:11px;
    padding:5px 10px;cursor:pointer;
    transition:background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .ans-toggle:hover{background:rgba(74,90,138,.08);}
  .ans-toggle.open{background:var(--tab-3);color:var(--paper);}
  
  .ans-box{
    display:block;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease, padding 0.3s ease, margin 0.3s ease;
    padding-top: 0;
    padding-bottom: 0;
    margin-top: 0;
    background:rgba(255,255,255,.5);border-left:3px solid var(--tab-3);
    font-size:13.5px;line-height:1.6;
  }
  body.dark-mode .ans-box{
    background:rgba(0,0,0,.25);
  }
  .ans-box.open {
    max-height: 1200px;
    opacity: 1;
    padding: 10px 12px;
    margin-top: 8px;
  }
  .ans-box .ex-label{
    display:block;font-family:'Courier New',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--tab-3);margin-bottom:5px;
  }

  .tip{
    font-size:13.5px;line-height:1.55;font-style:italic;color:var(--ink-soft);
    margin:12px 0 16px;padding:0 8px;border-left:2px solid var(--rule);
  }

  .skill-details{
    margin:14px 0 18px;font-size:14.2px;line-height:1.65;
    border-top:1px dashed var(--rule);border-bottom:1px dashed var(--rule);
    padding:14px 6px;
  }
  .skill-details ul {
    margin: 8px 0;
    padding-left: 20px;
  }
  .skill-details li {
    margin-bottom: 6px;
  }

  .hidden-by-search{display:none !important;}
  .count{font-family:'Courier New',monospace;font-size:11px;color:var(--ink-soft);margin-bottom:14px;}
  
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
  }
  th, td {
    border: 1px solid var(--rule);
    padding: 8px 10px;
    text-align: left;
  }
  th {
    background: rgba(0,0,0,0.03);
    font-weight: bold;
  }
  body.dark-mode th {
    background: rgba(255,255,255,0.03);
  }

  footer{
    font-family:'Courier New',monospace;font-size:11px;color:var(--ink-soft);
    border-top:1px solid var(--rule);padding-top:16px;margin-top:60px;
    text-align:center;line-height:1.6;
  }
</style>
</head>
<body>
<div class="wrap">
  <!-- Global Navigation -->
  <div class="global-nav">
    <a href="index.html" id="nav-speaking">Speaking</a>
    <a href="reading.html" id="nav-reading">Reading</a>
    <a href="listening.html" id="nav-listening">Listening</a>
    <a href="writing.html" id="nav-writing">Writing</a>
  </div>

  <header>
    <div>
      <div class="kicker">IELTS Study Kit</div>
      <h1>Listening Skills</h1>
      <div class="sub">Structured methods, practice questions, and answer keys</div>
    </div>
    <button class="mode-toggle" id="dark-btn" onclick="toggleDarkMode()">DARK MODE</button>
  </header>

  <div class="view-switch">
    <div class="view-btn active">Listening Guide</div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="cari skill atau keyword..." oninput="filterSkills()">
  </div>

  <div class="count" id="count"></div>

  <div id="skills-list"></div>

  <footer>
    Answer Keys and reference materials parsed directly from Barron's IELTS textbook. Toggle Dark Mode above for comfort.
  </footer>
</div>

<script>
const SKILLS_DATA = [
  {
    "number": 1,
    "title": "Making Assumptions",
    "note": "Protects Section 1 & 3. Listen to context clues, speaker relationships, and environmental noises to assume who is speaking and where.",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>Listen for nouns, terms, or vocabulary that reveal the setting (e.g., *balcony, flat, deposit, rent* indicates a real estate context).</li>\n        <li>Analyze the speakers' tone and address styles (e.g., *Professor, doctor, classmate*) to assume their social relationship.</li>\n        <li>Keep track of transaction terms to anticipate what the client needs (e.g., *parking space, storage area*).</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>context clue</b></td>\n          <td>Noun Phrase</td>\n          <td>petunjuk konteks / situasi</td>\n          <td>Kata atau suara latar yang membantu kita menebak di mana percakapan berlangsung.</td>\n        </tr>\n        <tr>\n          <td><b>low monthly fee</b></td>\n          <td>Noun Phrase</td>\n          <td>biaya bulanan yang murah</td>\n          <td>Harga sewa per bulan; kata kunci penting dalam soal transaksi keuangan (Listening Part 1).</td>\n        </tr>\n        <tr>\n          <td><b>washing machine</b></td>\n          <td>Noun</td>\n          <td>mesin cuci</td>\n          <td>Peralatan rumah tangga; sering menjadi detail penentu kenyamanan unit sewa.</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {
        "q": "Speaker: 'We have garage parking spaces available for a low monthly fee... and storage areas in the basement.' What is the speaker's job?",
        "a": "<span class='pat-step1'>Identify context: rent, parking, basement storage.</span> <span class='pat-step2'>Infer role:</span> <span class='pat-step3'>The speaker is an apartment house manager or leasing agent.</span>"
      }
    ]
  },
  {
    "number": 2,
    "title": "Understanding Numbers",
    "note": "Avoids Common Typos. Distinguish between 'teen' (-teen) and 'ty' (-ty) pronunciations, and follow zip codes/phone numbers.",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>Pay close attention to syllable stress: numbers ending in *-teen* have stress on the last syllable (e.g., fif-TEEN); numbers ending in *-ty* have stress on the first syllable (e.g., FIF-ty).</li>\n        <li>Listen carefully to double numbers: \"double seven\" means 77; \"triple zero\" means 000.</li>\n        <li>Be ready for 'oh' representing zero (0) in phone numbers and codes.</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>stress</b></td>\n          <td>Noun / Verb</td>\n          <td>penekanan nada suara</td>\n          <td>Penekanan suku kata yang membedakan angka mirip (e.g., 15 vs 50).</td>\n        </tr>\n        <tr>\n          <td><b>double digits</b></td>\n          <td>Noun Phrase</td>\n          <td>dua angka kembar</td>\n          <td>Penyebutan angka berurutan sama, contoh: *double two* (22).</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {
        "q": "Audio: 'Our office number is seven-two-one, double one-two-seven.' Write down the phone number.",
        "a": "<span class='pat-step1'>Listen to chunk 1: 'seven-two-one' -> 721.</span> <span class='pat-step2'>Listen to chunk 2: 'double one' -> 11.</span> <span class='pat-step3'>Listen to chunk 3: 'two-seven' -> 27. Number: 721-1127.</span>"
      }
    ]
  },
  {
    "number": 3,
    "title": "Understanding the Alphabet",
    "note": "For Spelling Tasks. Follow spelling sequences closely, noting double letters, homophones, or silent letters.",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>Identify common spelling sounds: 'A' vs 'E' vs 'I', 'G' vs 'J', 'Y' vs 'U'.</li>\n        <li>Be alert when the speaker spells names (e.g., \"K-I-N-G-S-T-O-N\") or lists postal codes (e.g., \"SW1A\").</li>\n        <li>Note if they say \"double L\" (ll) or \"capital B\" (B).</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>spelt names</b></td>\n          <td>Noun Phrase</td>\n          <td>nama yang dieja huruf per huruf</td>\n          <td>Ejaan nama tempat/orang yang harus ditulis tepat sesuai huruf yang diucapkan.</td>\n        </tr>\n        <tr>\n          <td><b>homophone letters</b></td>\n          <td>Noun Phrase</td>\n          <td>huruf berbunyi mirip</td>\n          <td>Huruf yang rawan tertukar saat didengar (seperti B dan P, M dan N).</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {
        "q": "Audio: 'My name is Kingston. James Kingston. That's K-I-N-G-S-T-O-N.' Write down the spelling.",
        "a": "<span class='pat-step1'>Listen to ejaan: K - I - N - G - S - T - O - N.</span> <span class='pat-step2'>Combine:</span> <span class='pat-step3'>Kingston.</span>"
      }
    ]
  },
  {
    "number": 4,
    "title": "Distinguishing Similar Sounds",
    "note": "Aids Transcription Accuracy. Practice listening for minimal pairs like 'fifteen'/'fifty' or word-ending consonants.",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>Practice minimal pairs\u2014words that differ in only one phoneme (sound), such as *bad* vs *bed*, *walk* vs *work*.</li>\n        <li>Look at surrounding sentence context to select the word that makes grammatical sense.</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>minimal pair</b></td>\n          <td>Noun Phrase</td>\n          <td>pasangan kata mirip</td>\n          <td>Dua kata yang pelafalannya hampir identik namun memiliki satu perbedaan bunyi vital.</td>\n        </tr>\n        <tr>\n          <td><b>consonant sound</b></td>\n          <td>Noun Phrase</td>\n          <td>bunyi konsonan / mati</td>\n          <td>Bunyi huruf mati di akhir kata yang menentukan bentuk jamak/tunggal (misal: *card* vs *cards*).</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {
        "q": "Audio: 'The room is fifty square meters.' Question: 'How big is the room? 15 or 50?'",
        "a": "<span class='pat-step1'>Listen to syllable stress: 'FIF-ty' has stress at the start.</span> <span class='pat-step2'>Compare context: '15' would be 'fif-TEEN'.</span> <span class='pat-step3'>Answer: 50.</span>"
      }
    ]
  },
  {
    "number": 5,
    "title": "Listening for Descriptions",
    "note": "For Diagram Labeling. Follow adjectives describing shape, size, location, and materials to match labels.",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>Before listening, study the map or diagram. Note key landmarks (corners, intersections, entrances).</li>\n        <li>Listen for relative direction words (*across from, next to, behind, opposite, on the left-hand side*).</li>\n        <li>Identify shape words (*circular, rectangular, triangular*) and sizing (*spacious, narrow*).</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>across from</b></td>\n          <td>Prep Phrase</td>\n          <td>berseberangan dengan</td>\n          <td>Posisi yang berhadapan di seberang jalan atau lorong.</td>\n        </tr>\n        <tr>\n          <td><b>next to</b></td>\n          <td>Prep Phrase</td>\n          <td>di sebelah / samping</td>\n          <td>Bersebelahan langsung tanpa bangunan perantara.</td>\n        </tr>\n        <tr>\n          <td><b>on the left-hand side</b></td>\n          <td>Prep Phrase</td>\n          <td>di sebelah kiri</td>\n          <td>Arah relatif dari sudut pandang pembicara.</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {
        "q": "Audio: 'On the corner of my street there is a grocery store. Across from that, there is a dry cleaner. Next to the dry cleaner is a clothing store.' Where is the clothing store relative to the grocery store?",
        "a": "<span class='pat-step1'>Trace landmark 1: Grocery store is on the corner.</span> <span class='pat-step2'>Trace landmark 2: Dry cleaner is across from grocery store.</span> <span class='pat-step3'>Trace clothing store: Next to dry cleaner (so it is also across the street from the grocery store/corner).</span>"
      }
    ]
  },
  {
    "number": 6,
    "title": "Listening for Time",
    "note": "Avoids Scheduling Errors. Track dates, specific hours, duration, and time-zone indicators (*a.m./p.m.*).",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>Listen for time changes or updates: speakers often correct themselves (e.g., \"The bus leaves at 6:45, wait, sorry, it actually leaves at 7:15 now\").</li>\n        <li>Note durations: \"from 6:45 until 8:15\" is a duration of 1.5 hours.</li>\n        <li>Be ready to convert dates (e.g., \"the week of August 28\" or \"Friday, April 6\").</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>departure time</b></td>\n          <td>Noun Phrase</td>\n          <td>jam keberangkatan</td>\n          <td>Waktu keberangkatan transportasi umum; sering disesuaikan atau dikoreksi pembicara.</td>\n        </tr>\n        <tr>\n          <td><b>p.m. / a.m.</b></td>\n          <td>Abbreviation</td>\n          <td>sore-malam / pagi-siang</td>\n          <td>Penunjuk waktu 12 jam (ante/post meridiem). Penting ditulis lengkap jika ditanyakan.</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {
        "q": "Audio: 'The first bus leaves the station at 6:45 a.m., but that is the express bus. The local bus leaves 30 minutes later.' When does the local bus leave?",
        "a": "<span class='pat-step1'>Base time: Express bus at 6:45 a.m.</span> <span class='pat-step2'>Add duration: Local bus is 30 minutes later.</span> <span class='pat-step3'>Calculate: 6:45 + 30 mins = 7:15 a.m. Answer: 7:15 a.m.</span>"
      }
    ]
  },
  {
    "number": 7,
    "title": "Listening for Frequency",
    "note": "For Habit-Based Questions. Differentiate adverbs of frequency (*always, twice a week, annually*) from one-off events.",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>Listen for how often an activity occurs. Look for words like *every day, bi-weekly, once a year*.</li>\n        <li>Distinguish between ideal frequency and actual frequency (e.g., \"I try to exercise every day, but I only make it twice a week\").</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>twice a week</b></td>\n          <td>Adverb Phrase</td>\n          <td>dua kali seminggu</td>\n          <td>Frekuensi rutin kunjungan belanja atau latihan olahraga.</td>\n        </tr>\n        <tr>\n          <td><b>annual / annually</b></td>\n          <td>Adj / Adverb</td>\n          <td>tahunan / setahun sekali</td>\n          <td>Kejadian sekali dalam setahun (misal: konferensi atau audit).</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {

        "a": "<span class='pat-step1'>Analyze: Speaker wants to go every day (intent).</span> <span class='pat-step2'>Extract reality: 'only get there twice a week'.</span> <span class='pat-step3'>Answer: Twice a week / Two times a week.</span>"

    "items": [

    "number": 10,

// Dark Mode logic
function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('dark-mode', isDark);
  document.getElementById('dark-btn').textContent = isDark ? 'LIGHT MODE' : 'DARK MODE';
}

// Initialize dark mode
if (localStorage.getItem('dark-mode') === 'true') {
  document.body.classList.add('dark-mode');
  document.getElementById('dark-btn').textContent = 'LIGHT MODE';
}

// Set active navigation tab
const activeNav = 'nav-' + 'listening';
document.getElementById(activeNav).classList.add('active');

function escapeAttribute(str) {
  if (!str) return '';
  return str
    .replace(/<[^>]*>/g, ' ')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .trim();
}

function toggleSkill(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function toggleAnswer(event, btnEl) {
  event.stopPropagation();
  const box = btnEl.parentElement.nextElementSibling;
  box.classList.toggle('open');
  btnEl.classList.toggle('open');
  btnEl.textContent = btnEl.classList.contains('open') ? 'Hide details' : 'Show details';
}

function renderSkillsList() {
  const listEl = document.getElementById('skills-list');
  listEl.innerHTML = SKILLS_DATA.map(s => {
    const safeBody = escapeAttribute(s.note + ' ' + s.details);
    const itemsHtml = s.items.map((item, i) => `
      <li>
        <div class="qa-row">
          <span class="qa-q"><b>${item.q}</b></span>
          <button class="ans-toggle" onclick="toggleAnswer(event, this)">Show details</button>
        </div>
        <div class="ans-box">
          <span class="ex-label">Answer Key / Explanation</span>
          <div>${item.a}</div>
        </div>
      </li>
    `).join('');
    
    return `
      <div class="cue-card skill-card" data-title="${s.title.toLowerCase()}" data-body="${safeBody.toLowerCase()}">
        <div class="skill-card-head" onclick="toggleSkill(this)" style="cursor:pointer;">
          <div style="display:flex; align-items:center; gap:10px;">
            <span class="skill-num">SKILL ${s.number}</span>
            <strong>${s.title}</strong>
          </div>
          <span class="caret">▶</span>
        </div>
        <div class="skill-body-wrapper">
          <p class="tip" style="margin-top:14px;">${s.note}</p>
          <div class="skill-details">
            ${s.details}
          </div>
          <ol class="qlist" style="padding-top:0; padding-bottom:0;">
            ${itemsHtml}
          </ol>
        </div>
      </div>
    `;
  }).join('');
  
  filterSkills();
}

function filterSkills() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  let count = 0;
  
  document.querySelectorAll('.skill-card').forEach(card => {
    const title = card.getAttribute('data-title');
    const body = card.getAttribute('data-body');
    const match = !query || title.includes(query) || body.includes(query);
    
    if (match) {
      card.classList.remove('hidden-by-search');
      count++;
    } else {
      card.classList.add('hidden-by-search');
    }
  });
  
  document.getElementById('count').textContent = `${count} skills shown`;
}

// Initial load
renderSkillsList();
</script>
