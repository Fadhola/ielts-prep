<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Reading — Practice Kit</title>
<style>
  :root{
    --paper:#eee7d8;
    --ink:#22303f;
    --ink-soft:#5a6b7a;
    --rule:#c9bfa4;
    --tab-1:#8a5a3f;
    --tab-2:#3f6e5e;
    --tab-3:#4a5a8a;
    --card:#f7f3e8;
    --err:#b23a3a;
    --vocab:#3f5e8a;
    --idiom:#7a3f6e;
    --good:#2f7a4f;
    --gen:#8a8578;
  }
  
  body.dark-mode {
    --paper:#1b1913;
    --ink:#ede8dc;
    --ink-soft:#a29988;
    --rule:#4d4637;
    --tab-1:#b88363;
    --tab-2:#569681;
    --tab-3:#6d7da8;
    --card:#242017;
    --err:#d95f5f;
    --vocab:#6997d3;
    --idiom:#b56ba7;
    --good:#4eaf75;
    --gen:#a29e92;
  }

  *{box-sizing:border-box;}

  ::-webkit-scrollbar {
    width: 10px;
    height: 10px;
  }
  ::-webkit-scrollbar-track {
    background: var(--paper);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--rule);
    border-radius: 5px;
    border: 2px solid var(--paper);
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--ink-soft);
  }
  
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:'Georgia','Iowan Old Style',serif;
    padding:32px 16px 80px;
    min-height:100vh;
    transition:background-color 0.3s ease, color 0.3s ease;
  }
  
  .wrap{max-width:820px;margin:0 auto;}
  
  /* Global Navigation */
  .global-nav {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 12px;
  }
  .global-nav a {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink-soft);
    padding: 6px 12px;
    border-radius: 3px;
    transition: all 0.2s ease;
  }
  .global-nav a:hover {
    color: var(--ink);
    background: rgba(0,0,0,0.04);
  }
  body.dark-mode .global-nav a:hover {
    background: rgba(255,255,255,0.04);
  }
  .global-nav a.active {
    color: var(--paper);
    background: var(--ink);
  }

  header{
    border-bottom:3px double var(--ink);
    padding-bottom:18px;
    margin-bottom:24px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    transition:border-color 0.3s ease;
  }
  
  .kicker{font-family:'Courier New',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);transition:color 0.3s ease;}
  h1{font-size:34px;margin:6px 0 4px;font-weight:400;}
  .sub{color:var(--ink-soft);font-size:14px;font-style:italic;transition:color 0.3s ease;}

  .mode-toggle{
    font-family:'Courier New',monospace;font-size:11px;background:none;border:1px solid var(--ink);
    color:var(--ink);padding:6px 10px;cursor:pointer;border-radius:3px;
    transition:background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .mode-toggle:hover{background:rgba(0,0,0,.05);}
  body.dark-mode .mode-toggle:hover{background:rgba(255,255,255,.05);}

  .view-switch {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--paper);
    padding: 14px 0 12px 0;
    margin: 0 0 20px 0;
    border-bottom: 1px solid var(--rule);
    display: flex;
    gap: 8px;
    transition: background-color 0.3s ease, border-color 0.3s ease;
  }
  .view-btn{
    flex:1;font-family:'Courier New',monospace;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    padding: 10px 14px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;border-radius:3px;text-align:center;
    transition:background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease;
  }
  .view-btn.active{background:var(--ink);color:var(--paper);}

  .controls {
    position: sticky;
    top: 61px;
    z-index: 99;
    background: var(--paper);
    padding: 10px 0;
    margin: 0 0 20px 0;
    border-bottom: 1px dashed var(--rule);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    transition: background-color 0.3s ease, border-color 0.3s ease;
  }
  .controls input[type=text]{
    flex:1;min-width:180px;font-family:'Courier New',monospace;font-size:13px;
    padding:9px 12px;border:1px solid var(--rule);background:var(--card);color:var(--ink);border-radius:3px;
    transition:background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
  }
  .controls input[type=text]:focus{
    outline:none;
    border-color:var(--ink);
  }

  .cue-card, .band-card{
    border:1px solid var(--rule);background:var(--card);margin-bottom:14px;border-radius:3px;overflow:hidden;
    transition:background-color 0.3s ease, border-color 0.3s ease;
  }
  .skill-card-head{
    padding:11px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:15px;border-bottom:1px solid transparent;
    transition:background-color 0.3s ease, border-color 0.3s ease;
  }
  .skill-card-head:hover{background:rgba(0,0,0,.03);}
  body.dark-mode .skill-card-head:hover{background:rgba(255,255,255,.03);}
  
  .cue-card.skill-card.open .skill-card-head{
    border-bottom-color:var(--rule);
  }
  
  .skill-body-wrapper {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    padding: 0 16px;
  }
  .cue-card.skill-card.open .skill-body-wrapper {
    max-height: 2000px;
    opacity: 1;
    padding-bottom: 16px;
  }

  .caret{font-family:'Courier New',monospace;font-size:12px;color:var(--ink-soft);transition:transform .2s ease, color 0.3s ease;}
  .cue-card.skill-card.open .caret{transform:rotate(90deg);}

  .skill-num{
    font-family:'Courier New',monospace;font-size:12px;font-weight:bold;padding:2px 8px;border-radius:2px;color:var(--paper);
    background: var(--tab-3);
  }
  .skill-criterion{
    font-family:'Courier New',monospace;font-size:10.5px;color:var(--ink-soft);border:1px solid var(--rule);padding:1px 6px;border-radius:2px;
  }

  ol.qlist{list-style:none;counter-reset:q;margin:0;padding:12px 16px 14px;}
  ol.qlist li{
    counter-increment:q;position:relative;padding:8px 0 8px 30px;font-size:14.5px;line-height:1.55;border-bottom:1px dashed var(--rule);
    transition:border-color 0.3s ease;
  }
  ol.qlist li:last-child{border-bottom:none;}
  ol.qlist li::before{content:counter(q,decimal-leading-zero);position:absolute;left:0;top:8px;font-family:'Courier New',monospace;font-size:11px;color:var(--ink-soft);}

  .qa-row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .qa-q{flex:1;}
  .ans-toggle{
    flex-shrink:0;
    font-family:'Courier New',monospace;font-size:10.5px;letter-spacing:.03em;text-transform:uppercase;
    color:var(--tab-3);background:none;border:1px solid var(--tab-3);border-radius:11px;
    padding:5px 10px;cursor:pointer;
    transition:background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .ans-toggle:hover{background:rgba(74,90,138,.08);}
  .ans-toggle.open{background:var(--tab-3);color:var(--paper);}
  
  .ans-box{
    display:block;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease, padding 0.3s ease, margin 0.3s ease;
    padding-top: 0;
    padding-bottom: 0;
    margin-top: 0;
    background:rgba(255,255,255,.5);border-left:3px solid var(--tab-3);
    font-size:13.5px;line-height:1.6;
  }
  body.dark-mode .ans-box{
    background:rgba(0,0,0,.25);
  }
  .ans-box.open {
    max-height: 1200px;
    opacity: 1;
    padding: 10px 12px;
    margin-top: 8px;
  }
  .ans-box .ex-label{
    display:block;font-family:'Courier New',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--tab-3);margin-bottom:5px;
  }

  .tip{
    font-size:13.5px;line-height:1.55;font-style:italic;color:var(--ink-soft);
    margin:12px 0 16px;padding:0 8px;border-left:2px solid var(--rule);
  }

  .skill-details{
    margin:14px 0 18px;font-size:14.2px;line-height:1.65;
    border-top:1px dashed var(--rule);border-bottom:1px dashed var(--rule);
    padding:14px 6px;
  }
  .skill-details ul {
    margin: 8px 0;
    padding-left: 20px;
  }
  .skill-details li {
    margin-bottom: 6px;
  }

  .hidden-by-search{display:none !important;}
  .count{font-family:'Courier New',monospace;font-size:11px;color:var(--ink-soft);margin-bottom:14px;}
  
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
  }
  th, td {
    border: 1px solid var(--rule);
    padding: 8px 10px;
    text-align: left;
  }
  th {
    background: rgba(0,0,0,0.03);
    font-weight: bold;
  }
  body.dark-mode th {
    background: rgba(255,255,255,0.03);
  }

  footer{
    font-family:'Courier New',monospace;font-size:11px;color:var(--ink-soft);
    border-top:1px solid var(--rule);padding-top:16px;margin-top:60px;
    text-align:center;line-height:1.6;
  }
</style>
</head>
<body>
<div class="wrap">
  <!-- Global Navigation -->
  <div class="global-nav">
    <a href="index.html" id="nav-speaking">Speaking</a>
    <a href="reading.html" id="nav-reading">Reading</a>
    <a href="listening.html" id="nav-listening">Listening</a>
    <a href="writing.html" id="nav-writing">Writing</a>
  </div>

  <header>
    <div>
      <div class="kicker">IELTS Study Kit</div>
      <h1>Reading Skills</h1>
      <div class="sub">Structured methods, practice questions, and answer keys</div>
    </div>
    <button class="mode-toggle" id="dark-btn" onclick="toggleDarkMode()">DARK MODE</button>
  </header>

  <div class="view-switch">
    <div class="view-btn active">Reading Guide</div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="cari skill atau keyword..." oninput="filterSkills()">
  </div>

  <div class="count" id="count"></div>

  <div id="skills-list"></div>

  <footer>
    Answer Keys and reference materials parsed directly from Barron's IELTS textbook. Toggle Dark Mode above for comfort.
  </footer>
</div>

<script>
const SKILLS_DATA = [
  {
    "number": 1,
    "title": "Using the First Paragraph to Make Predictions",
    "note": "Protects Reading Speed & Comprehension. Skim the introductory paragraph to identify the thesis statement and predict the passage theme.",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>Always read the first paragraph (introduction) first. It introduces the main topic and context of the passage.</li>\n        <li>Locate the <b>Thesis Statement</b>\u2014usually the first or last sentence of the introduction\u2014which states the main point of the entire text.</li>\n        <li>Use this thesis to predict the overall layout, content, and arguments that will follow in the body paragraphs.</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>thesis statement</b></td>\n          <td>Noun Phrase</td>\n          <td>pernyataan tesis / ide pokok</td>\n          <td>Kalimat kunci yang merangkum inti seluruh bacaan. Biasanya ada di akhir paragraf pertama.</td>\n        </tr>\n        <tr>\n          <td><b>make predictions</b></td>\n          <td>Verb Phrase</td>\n          <td>membuat prediksi / perkiraan</td>\n          <td>Menebak isi paragraf berikutnya berdasarkan kalimat pengantar untuk menghemat waktu baca.</td>\n        </tr>\n        <tr>\n          <td><b>introductory paragraph</b></td>\n          <td>Noun Phrase</td>\n          <td>paragraf pembuka / pengantar</td>\n          <td>Paragraf pertama yang membangun latar belakang topik (background context).</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {
        "q": "Identify the thesis statement: 'Observations of different species of birds, both in the wild and in captivity, have shown a great deal of evidence of high levels of avian intelligence.' What is the predicted topic?",
        "a": "<span class='pat-step1'>Thesis statement is the entire sentence.</span> <span class='pat-step2'>The predicted topic is:</span> <span class='pat-step3'>The passage will describe scientific experiments and behavior proving how smart birds are.</span>"
      }
    ]
  },
  {
    "number": 2,
    "title": "Using the Topic Sentence to Make Predictions",
    "note": "Aids Skimming. Read the first sentence of each body paragraph to find its topic sentence and predict the sub-details.",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>The <b>Topic Sentence</b> is the first sentence of a body paragraph and expresses its main idea.</li>\n        <li>If the first sentence is not the topic sentence, read the second or last sentence.</li>\n        <li>Predict what supporting details (examples, facts, stats) will appear in the rest of the paragraph.</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>topic sentence</b></td>\n          <td>Noun Phrase</td>\n          <td>kalimat topik / ide pokok paragraf</td>\n          <td>Kalimat utama di awal paragraf yang mengontrol seluruh isi paragraf tersebut.</td>\n        </tr>\n        <tr>\n          <td><b>body paragraph</b></td>\n          <td>Noun Phrase</td>\n          <td>paragraf isi / paragraf utama</td>\n          <td>Paragraf setelah pendahuluan yang mengembangkan poin-poin tesis.</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {
        "q": "Identify the topic sentence: 'To combat excessive thoughts and impulses, most OCD sufferers perform certain repetitive rituals that they believe will relieve their anxiety.' Predict the paragraph's details.",
        "a": "<span class='pat-step1'>Topic sentence: First sentence.</span> <span class='pat-step2'>Prediction:</span> <span class='pat-step3'>The paragraph will detail the specific repetitive rituals (checking, washing, counting) performed by OCD sufferers.</span>"
      }
    ]
  },
  {
    "number": 3,
    "title": "Looking for Supporting Details",
    "note": "Crucial for Detail-Matching Questions. Identify facts, statistics, examples, or quotes that back up the topic sentence.",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>Supporting details are the 'meat' of the paragraph\u2014they prove the topic sentence.</li>\n        <li>Look for types of evidence: statistics (numbers), names, scientific facts, historical dates, or examples.</li>\n        <li>Map these details back to the main topic sentence to confirm your understanding.</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>supporting details</b></td>\n          <td>Noun Phrase</td>\n          <td>detail / informasi pendukung</td>\n          <td>Fakta, contoh, atau statistik yang memperkuat kalimat topik utama.</td>\n        </tr>\n        <tr>\n          <td><b>factual evidence</b></td>\n          <td>Noun Phrase</td>\n          <td>bukti faktual / nyata</td>\n          <td>Informasi objektif yang dapat diverifikasi (data, nama peneliti, dll).</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {
        "q": "In a paragraph about Zulu beadwork being communication: 'Beads are used to make items for personal adornment, home decoration, and as a language to send status messages.' What are the supporting details?",
        "a": "<span class='pat-step1'>Main idea: Zulu beadwork is a form of communication.</span> <span class='pat-step2'>Supporting details:</span> <span class='pat-step3'>1) Items for personal adornment. 2) Home decoration. 3) Language to send status/relationship messages.</span>"
      }
    ]
  },
  {
    "number": 4,
    "title": "Using Key Words",
    "note": "Core Scanning Skill. Circle key nouns, verbs, dates, and names in the questions, then locate them or their synonyms in the passage.",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>Do not read the passage word-for-word first. Go to the questions, circle <b>Key Words</b> (nouns, names, dates, numbers).</li>\n        <li>Scan the text quickly by running your eyes over it looking for these keywords or their synonyms/paraphrases.</li>\n        <li>When found, read closely (intensive reading) the surrounding sentences to extract the answer.</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>keyword scanning</b></td>\n          <td>Noun Phrase</td>\n          <td>pemindaian kata kunci</td>\n          <td>Mencari letak kata kunci tanpa membaca arti kalimat secara keseluruhan terlebih dahulu.</td>\n        </tr>\n        <tr>\n          <td><b>equivalent meaning</b></td>\n          <td>Noun Phrase</td>\n          <td>makna setara / sinonim</td>\n          <td>Kata yang berbeda namun memiliki arti yang sama (misal: *fix* = *repair*).</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {
        "q": "Question: 'On what date did Portuguese explorers arrive in KwaZulu-Natal?' What are the keywords to scan?",
        "a": "<span class='pat-step1'>Keywords: 'Portuguese explorers', 'arrive', 'KwaZulu-Natal'.</span> <span class='pat-step2'>Scan the text for these words or dates like '1497'.</span> <span class='pat-step3'>Found sentence: 'Portuguese explorers gave this region when they arrived in 1497.' Answer: 1497.</span>"
      }
    ]
  },
  {
    "number": 5,
    "title": "Matching Headings to Paragraphs",
    "note": "Common Reading Question. Identify the core theme of each paragraph to select the correct heading from a list.",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>Read the paragraph's topic sentence and concluding sentence to grasp the core theme.</li>\n        <li>Watch out for <b>distractors</b>\u2014headings that contain words from the paragraph but do not represent the main idea.</li>\n        <li>Cross out headings as you use them to narrow down choices.</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>heading matching</b></td>\n          <td>Noun Phrase</td>\n          <td>pencocokan kepala paragraf</td>\n          <td>Memilih judul/ikhtisar yang paling sesuai dengan isi satu paragraf utuh.</td>\n        </tr>\n        <tr>\n          <td><b>distractor</b></td>\n          <td>Noun</td>\n          <td>distraktor / opsi pengecoh</td>\n          <td>Pilihan jawaban salah yang sengaja dibuat menyerupai teks asli untuk menguji ketelitian.</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {
        "q": "Paragraph A discusses how people think colorblindness means seeing no color, but explains it is actually difficulty distinguishing shades. Headings options: 'i. Complete Blindness', 'ii. What Is Colorblindness?', 'iii. Genetic Causes'. Select the best heading.",
        "a": "<span class='pat-step1'>Analyze: Paragraph defines and corrects misconceptions about colorblindness.</span> <span class='pat-step2'>Compare headings: 'ii' represents the definition.</span> <span class='pat-step3'>Correct heading: 'ii. What Is Colorblindness?'. 'i' is a distractor.</span>"
      }
    ]
  },
  {
    "number": 6,
    "title": "Making Predictions (General Training)",
    "note": "Saves Time in GT Reading. Identify text types (ads, schedules, forms) to predict where key details are placed.",
    "details": "\n      <b>Strategy & Method:</b>\n      <ul>\n        <li>Identify the text format immediately (e.g., advertisement, course descriptions, employee handbook).</li>\n        <li>Predict the layout: advertisements have price/location at the bottom; handbooks have bulleted policies.</li>\n        <li>Focus your search based on layout predictions.</li>\n      </ul>\n      <b>Key Vocabulary & Patterns:</b>\n      <table>\n        <tr>\n          <th>English Pattern</th>\n          <th>Type / Role</th>\n          <th>Arti (Indonesian)</th>\n          <th>Usage Context &amp; Explanation</th>\n        </tr>\n        <tr>\n          <td><b>text type</b></td>\n          <td>Noun Phrase</td>\n          <td>jenis teks / format dokumen</td>\n          <td>Bentuk fisik dokumen seperti selebaran, brosur, jadwal, atau panduan kerja.</td>\n        </tr>\n        <tr>\n          <td><b>course descriptions</b></td>\n          <td>Noun Phrase</td>\n          <td>deskripsi kursus / mata pelajaran</td>\n          <td>Teks yang merinci nama kelas, jadwal, nama pengajar, dan buku wajib.</td>\n        </tr>\n      </table>\n    ",
    "items": [
      {
        "q": "You see a document with headers: 'Beginning French, Intermediate French, Advanced Spanish' along with times like '4:00-6:00 p.m.' and names like 'Mr. Sato'. Predict the text type.",
        "a": "<span class='pat-step1'>Examine elements: Class names, times, names of people.</span> <span class='pat-step2'>Identify:</span> <span class='pat-step3'>This is a Course Description / Class Schedule text type.</span>"
      }
    ]
  },
  {
    "number": 7,
    "title": "Scanning for Specific Details (General Training)",
    "note": "For Fact-Finding Questions. Look for numbers, hours, contacts, or names without reading paragraphs.",

// Dark Mode logic
function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('dark-mode', isDark);
  document.getElementById('dark-btn').textContent = isDark ? 'LIGHT MODE' : 'DARK MODE';
}

// Initialize dark mode
if (localStorage.getItem('dark-mode') === 'true') {
  document.body.classList.add('dark-mode');
  document.getElementById('dark-btn').textContent = 'LIGHT MODE';
}

// Set active navigation tab
const activeNav = 'nav-' + 'reading';
document.getElementById(activeNav).classList.add('active');

function escapeAttribute(str) {
  if (!str) return '';
  return str
    .replace(/<[^>]*>/g, ' ')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;')
    .trim();
}

function toggleSkill(headEl) {
  headEl.parentElement.classList.toggle('open');
}

function toggleAnswer(event, btnEl) {
  event.stopPropagation();
  const box = btnEl.parentElement.nextElementSibling;
  box.classList.toggle('open');
  btnEl.classList.toggle('open');
  btnEl.textContent = btnEl.classList.contains('open') ? 'Hide details' : 'Show details';
}

function renderSkillsList() {
  const listEl = document.getElementById('skills-list');
  listEl.innerHTML = SKILLS_DATA.map(s => {
    const safeBody = escapeAttribute(s.note + ' ' + s.details);
    const itemsHtml = s.items.map((item, i) => `
      <li>
        <div class="qa-row">
          <span class="qa-q"><b>${item.q}</b></span>
          <button class="ans-toggle" onclick="toggleAnswer(event, this)">Show details</button>
        </div>
        <div class="ans-box">
          <span class="ex-label">Answer Key / Explanation</span>
          <div>${item.a}</div>
        </div>
      </li>
    `).join('');
    
    return `
      <div class="cue-card skill-card" data-title="${s.title.toLowerCase()}" data-body="${safeBody.toLowerCase()}">
        <div class="skill-card-head" onclick="toggleSkill(this)" style="cursor:pointer;">
          <div style="display:flex; align-items:center; gap:10px;">
            <span class="skill-num">SKILL ${s.number}</span>
            <strong>${s.title}</strong>
          </div>
          <span class="caret">▶</span>
        </div>
        <div class="skill-body-wrapper">
          <p class="tip" style="margin-top:14px;">${s.note}</p>
          <div class="skill-details">
            ${s.details}
          </div>
          <ol class="qlist" style="padding-top:0; padding-bottom:0;">
            ${itemsHtml}
          </ol>
        </div>
      </div>
    `;
  }).join('');
  
  filterSkills();
}

function filterSkills() {
  const query = document.getElementById('search').value.trim().toLowerCase();
  let count = 0;
  
  document.querySelectorAll('.skill-card').forEach(card => {
    const title = card.getAttribute('data-title');
    const body = card.getAttribute('data-body');
    const match = !query || title.includes(query) || body.includes(query);
    
    if (match) {
      card.classList.remove('hidden-by-search');
      count++;
    } else {
      card.classList.add('hidden-by-search');
    }
  });
  
  document.getElementById('count').textContent = `${count} skills shown`;
}

// Initial load
renderSkillsList();
</script>
